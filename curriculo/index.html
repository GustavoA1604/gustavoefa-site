<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gustavo Araujo - Currículo</title>
  <meta name="description" content="Currículo de Gustavo Araujo, Lead Software Engineer." />
  <link rel="stylesheet" href="../assets/base.css" />
  <link rel="stylesheet" href="../assets/resume.css" />
</head>
<body>
  <header class="resume-hero">
    <div class="container">
      <div class="toolbar">
        <button type="button" id="r-print" class="print-btn">Imprimir / Salvar PDF</button>
        <div class="lang-switch" role="group" aria-label="Language / Idioma">
          <button type="button" data-lang="pt" class="lang-btn">
            <svg class="flag" viewBox="0 0 28 20" aria-hidden="true">
              <rect width="28" height="20" fill="#009b3a" />
              <polygon points="14,2 26,10 14,18 2,10" fill="#fedf00" />
              <circle cx="14" cy="10" r="4.2" fill="#002776" />
            </svg>
            <span>PT</span>
          </button>
          <span class="lang-sep">/</span>
          <button type="button" data-lang="en" class="lang-btn">
            <svg class="flag" viewBox="0 0 60 30" aria-hidden="true">
              <clipPath id="uk-clip"><path d="M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z" /></clipPath>
              <rect width="60" height="30" fill="#012169" />
              <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6" />
              <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#uk-clip)" stroke="#c8102e" stroke-width="4" />
              <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10" />
              <path d="M30,0 v30 M0,15 h60" stroke="#c8102e" stroke-width="6" />
            </svg>
            <span>EN</span>
          </button>
        </div>
      </div>
      <h1 id="r-name">Gustavo Emanuel Faria Araujo</h1>
      <p class="role" id="r-role">Lead Software Engineer</p>
      <div class="contact" id="r-contact"></div>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h2 id="r-summary-title">Resumo</h2>
      <p class="summary" id="r-summary"></p>
    </section>

    <div class="resume-layout">
      <div class="resume-main">
        <section class="section">
          <h2 id="r-exp-title">Experiência profissional</h2>
          <div id="r-experience"></div>
        </section>

      <section class="section">
        <h2 id="r-edu-title">Formação acadêmica</h2>
        <div id="r-education"></div>
      </section>

      <section class="section">
        <h2 id="r-ind-title">Participação no setor</h2>
        <ul id="r-industry"></ul>
      </section>
    </div>

    <aside class="resume-side">
      <section class="section">
        <h2 id="r-skills-title">Competências</h2>
        <div class="skill-grid" id="r-skills"></div>
      </section>

      <section class="section">
        <h2 id="r-lang-title">Idiomas</h2>
        <ul class="side-list" id="r-languages"></ul>
      </section>

      <section class="section">
        <h2 id="r-awards-title">Prêmios</h2>
        <ul class="side-list" id="r-awards"></ul>
      </section>
    </aside>
    </div>
  </main>

  <footer class="container">
    <p>&copy; <span id="year"></span> Gustavo Emanuel Faria Araujo</p>
  </footer>

  <script>window.RESUME_DEFAULT_LANG = "pt";</script>
  <script src="../assets/resume.js"></script>
</body>
</html>
