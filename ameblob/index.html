<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ameblob</title>
  <meta name="description" content="Survive and evolve while controlling an amoeba in a hostile world." />
  <link rel="canonical" href="https://gustavoefa.com.br/ameblob/" />

  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="../assets/favicon.png" sizes="any" />
  <link rel="apple-touch-icon" href="../assets/favicon.png" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/base.css" />
  <link rel="stylesheet" href="../assets/ameblob.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <div class="toolbar">
        <div class="toolbar-left">
          <a href="../" class="back-btn" data-i18n="back">← Back to home</a>
        </div>
        <div class="toolbar-right">
          <button type="button" id="theme-btn" class="theme-btn" aria-label="Toggle theme">
            <span class="theme-ico" aria-hidden="true">☾</span>
          </button>
          <div class="lang-switch" role="group" aria-label="Language / Idioma">
            <button type="button" data-lang="pt" class="lang-btn" aria-pressed="false">
              <svg class="flag" viewBox="0 0 28 20" aria-hidden="true"><use href="../assets/flags.svg#flag-br" /></svg>
              <span>PT</span>
            </button>
            <span class="lang-sep">/</span>
            <button type="button" data-lang="en" class="lang-btn" aria-pressed="false">
              <svg class="flag" viewBox="0 0 60 30" aria-hidden="true"><use href="../assets/flags.svg#flag-uk" /></svg>
              <span>EN</span>
            </button>
          </div>
        </div>
      </div>
      <h1>Ameblob</h1>
      <p class="tagline" data-i18n="tagline">Survive and evolve while controlling an amoeba in a hostile world.</p>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="game-frame-wrap" id="gameFrameWrap">
        <iframe id="gameFrame" src="./game/" title="Ameblob" scrolling="no"></iframe>
      </div>
    </section>
  </main>

  <footer class="container">
    <p>&copy; <span id="year"></span> Gustavo Emanuel Faria Araujo</p>
  </footer>

  <script>
    const translations = {
      pt: {
        lang: "pt-BR",
        title: "Ameblob",
        description: "Sobreviva e evolua controlando uma ameba num mundo hostil.",
        back: "← Voltar",
        tagline: "Sobreviva e evolua controlando uma ameba num mundo hostil.",
        theme: { light: "Tema claro", dark: "Tema escuro" },
      },
      en: {
        lang: "en",
        title: "Ameblob",
        description: "Survive and evolve while controlling an amoeba in a hostile world.",
        back: "← Back to home",
        tagline: "Survive and evolve while controlling an amoeba in a hostile world.",
        theme: { light: "Light theme", dark: "Dark theme" },
      },
    };

    function applyLanguage(lang) {
      currentLang = lang;
      const dict = translations[lang] || translations.en;
      document.documentElement.lang = dict.lang;
      document.title = dict.title;
      document.querySelector('meta[name="description"]').content = dict.description;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (dict[key]) el.textContent = dict[key];
      });
      document.querySelectorAll(".lang-btn").forEach((btn) => {
        const isActive = btn.dataset.lang === lang;
        btn.classList.toggle("active", isActive);
        btn.setAttribute("aria-pressed", String(isActive));
      });
      renderThemeBtn(dict);
      try {
        localStorage.setItem("lang", lang);
      } catch (e) {}
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => applyLanguage(btn.dataset.lang));
    });

    let currentTheme =
      document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    let currentLang = "en";

    function renderThemeBtn(dict) {
      const btn = document.getElementById("theme-btn");
      if (!btn) return;
      const dark = currentTheme === "dark";
      const ico = btn.querySelector(".theme-ico");
      if (ico) ico.textContent = dark ? "☀" : "☾";
      const label = dark ? dict.theme.light : dict.theme.dark;
      btn.setAttribute("aria-label", label);
      btn.setAttribute("title", label);
    }

    const themeBtn = document.getElementById("theme-btn");
    if (themeBtn)
      themeBtn.addEventListener("click", () => {
        currentTheme = currentTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", currentTheme);
        try {
          localStorage.setItem("theme", currentTheme);
        } catch (e) {}
        renderThemeBtn(translations[currentLang] || translations.en);
      });

    let saved = null;
    try {
      saved = localStorage.getItem("lang");
    } catch (e) {}
    const browserPt = (navigator.language || "").toLowerCase().startsWith("pt");
    currentLang = saved || (browserPt ? "pt" : "en");
    applyLanguage(currentLang);

    document.getElementById("year").textContent = new Date().getFullYear();

    // The game canvas is a fixed 500x500px document; scale the iframe with a
    // CSS transform to fit the available width instead of relying on the
    // embedded page to be responsive.
    function scaleGameFrame() {
      const wrap = document.getElementById("gameFrameWrap");
      const frame = document.getElementById("gameFrame");
      if (!wrap || !frame) return;
      const scale = wrap.clientWidth / 500;
      frame.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", scaleGameFrame);
    scaleGameFrame();
  </script>
</body>
</html>
