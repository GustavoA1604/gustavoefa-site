<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Gustavo Araujo - Resume</title>
  <meta name="description" content="Resume of Gustavo Araujo, Lead Software Engineer." />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="../assets/favicon.png" sizes="any" />
  <link rel="apple-touch-icon" href="../assets/favicon.png" />
  <script>
    // Set the theme before first paint to avoid a flash: stored choice wins,
    // else the OS preference, else light (the default datasheet look).
    (function () {
      try {
        var t = localStorage.getItem("resumeTheme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..125,400..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/base.css" />
  <link rel="stylesheet" href="../assets/resume.css" />
</head>
<body>
  <header class="resume-hero">
    <div class="container">
      <div class="toolbar">
        <div class="toolbar-left">
          <a href="../" id="r-back" class="back-btn">← Back to home</a>
          <a id="r-print" class="back-btn print-btn" href="../assets/Gustavo-Araujo-Resume.pdf" download="Gustavo-Araujo-Resume.pdf">⤓ Download PDF</a>
        </div>
        <div class="toolbar-right">
        <button type="button" id="r-theme" class="theme-btn" aria-label="Toggle theme">
          <span class="theme-ico" aria-hidden="true">☾</span>
        </button>
        <div class="lang-switch" role="group" aria-label="Language / Idioma">
          <button type="button" data-lang="pt" class="lang-btn" aria-pressed="false">
            <svg class="flag" viewBox="0 0 28 20" aria-hidden="true"><use href="../assets/flags.svg#flag-br" /></svg>
            <span>PT</span>
          </button>
          <span class="lang-sep">/</span>
          <button type="button" data-lang="en" class="lang-btn" aria-pressed="false">
            <svg class="flag" viewBox="0 0 60 30" aria-hidden="true"><use href="../assets/flags.svg#flag-uk" /></svg>
            <span>EN</span>
          </button>
        </div>
        </div>
      </div>
      <h1 id="r-name">Gustavo Emanuel Faria Araujo</h1>
      <p class="role" id="r-role">Lead Software Engineer</p>
      <div class="contact" id="r-contact"></div>
      <svg class="wave" viewBox="0 0 1000 60" preserveAspectRatio="none" aria-hidden="true">
        <path class="trace" pathLength="100" d="M0 30 L80 30 L92 14 L104 46 L116 18 L128 42 L140 24 L152 36 L230 30 L246 8 L262 52 L278 16 L294 44 L310 30 L420 30 L432 22 L444 30 L520 30 L536 6 L552 50 L568 20 L584 40 L600 26 L616 34 L632 30 L760 30 L772 12 L784 30 L1000 30" />
        <line class="cursor" x1="980" y1="19" x2="980" y2="41" />
      </svg>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h2 id="r-summary-title">Summary</h2>
      <p class="summary" id="r-summary"></p>
    </section>

    <section class="section">
      <h2 id="r-highlights-title">Selected highlights</h2>
      <div class="highlights" id="r-highlights"></div>
    </section>

    <div class="resume-layout">
      <div class="resume-main">
        <section class="section">
          <h2 id="r-exp-title">Professional experience</h2>
          <div id="r-experience"></div>
        </section>

      <section class="section">
        <h2 id="r-edu-title">Education</h2>
        <div id="r-education"></div>
      </section>
    </div>

    <aside class="resume-side">
      <section class="section">
        <h2 id="r-skills-title">Skills</h2>
        <div class="skill-grid" id="r-skills"></div>
      </section>

      <section class="section">
        <h2 id="r-lang-title">Languages</h2>
        <ul class="side-list" id="r-languages"></ul>
      </section>

      <section class="section">
        <h2 id="r-awards-title">Awards</h2>
        <ul class="side-list" id="r-awards"></ul>
      </section>

      <section class="section">
        <h2 id="r-beyond-title">Beyond work</h2>
        <ul class="beyond-list" id="r-beyond"></ul>
      </section>
    </aside>
    </div>
  </main>

  <footer class="container">
    <p>&copy; <span id="year"></span> Gustavo Emanuel Faria Araujo</p>
  </footer>

  <script>window.RESUME_DEFAULT_LANG = "en";</script>
  <script src="../assets/resume.js"></script>
</body>
</html>
